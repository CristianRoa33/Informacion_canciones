<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <header>
            <h1>header</h1>
        </header>
        <aside>
            <nav>
                <ul>
                    <li><a href="#">Agregar persona</a></li>
                    <li><a href="#">Ver todos</a></li>
                    <li><a href="#">Buscar posicion</a></li>
                    <li><a href="#">Ganador rifa</a></li>   
                </ul>
            </nav>
        </aside>   
        <section>
            <div id="formulario" class="formulario">
                <div>
                    <h2>Agregar Persona</h2>
                    <p>Complete todos los campos. Canciones opcionales (Máx.3).</p>
                </div>
                <form id= "formPersonas" action="">
                    <label for="nombre"> Nombre Completo
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                    </label>
                    <label for="cedula"> Número de Cédula
                        <input type="text" id="cedula" name="cedula" placeholder="Ej: 1234567890" required pattern="\d{10}" title="Debe contener exactamente 10 números" minlength="1" maxlength="12">
                    </label>
                    <label for="fechaNacimiento"> Fecha de Nacimiento
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" placeholder="Ej: 01/01/1990" required>
                    </label>
                    <label for="email"> Correo Electrónico
                        <input type="email" id="email" name="email" placeholder="Ej: correo@ejemplo.com" minlength="4"
                        maxlength="64" required>
                    </label>
                    <label for="ciudadResidencia"> Ciudad de Residencia
                        <input type="text" id="ciudadResidencia" name="ciudadResidencia" placeholder="Ej: Bogotá" required pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                    </label>
                    <label for="ciudadOrigen"> Ciudad de Origen
                        <input type="text" id="ciudadOrigen" name="ciudadOrigen" placeholder="Ej: Medellín" required pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                    </label>

                      <div>
                            <div>
                                <h3>canciones Favoritas</h3>
                            </div>
                            <div> 1
                        <label for="artista1"> 
                            <input type="text" id="artista1" name="artista1" placeholder="Ej: Héctor Lavoe" pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                            
                        <label for="cancion1"> 
                            <input type="text" id="cancion1" name="cancion1" placeholder="Ej: Qué lío " pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>

                        <label for="genero1"> 
                            <input type="text" id="genero1" name="genero1" placeholder="Ej: Salsa" pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                        </div>
                        <div> 2
                         <label for="artista2"> 
                            <input type="text" id="artista2" name="artista2" placeholder="Ej: Duran Duran" pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>

                        <label for="cancion2"> 
                            <input type="text" id="cancion2" name="cancion2" placeholder="Ej: Come Undone " pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                        <label for="genero2"> 
                            <input type="text" id="genero2" name="genero2" placeholder="Ej: rock-pop" pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                        </div>
                        <div> 3
                        <label for="artista3"> 
                            <input type="text" id="artista3" name="artista3" placeholder="Ej: Silvio Rodriguez" pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                        <label for="cancion3"> 
                            <input type="text" id="cancion3" name="cancion3" placeholder="Ej: Quien Fuera " pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>
                        <label for="genero3"> 
                            <input type="text" id="genero3" name="genero3" placeholder="Ej: Protesta " pattern="[A-Za-z\s]+" title="Solo se permiten letras y espacios" minlength="4" maxlength="64">
                        </label>


                      </div>  

                    <button type="submit">Agregar Persona</button>
                </form>
            </div>
        </section>
    </main>
    <script src="javascript/app.js"></script>
</body>
</html>
